apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sight-poc-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_GIT_REPOSITORY_URL
    targetRevision: REPLACE_WITH_GIT_TARGET_REVISION
    path: gitops/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
