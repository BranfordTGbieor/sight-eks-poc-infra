apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hydrosat-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BranfordTGbieor/hydrosat-infra.git
    targetRevision: dev
    path: gitops/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
