controller:
  type: daemonset
  podAnnotations:
    k8s.grafana.com/logs.job: hydrosat-alloy
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  volumes:
    extra:
      - name: host-root
        hostPath:
          path: /
      - name: host-proc
        hostPath:
          path: /proc
      - name: host-sys
        hostPath:
          path: /sys

alloy:
  envFrom:
    - secretRef:
        name: hydrosat-grafana-cloud
  mounts:
    varlog: true
    dockercontainers: true
    extra:
      - name: host-root
        mountPath: /host/root
        readOnly: true
      - name: host-proc
        mountPath: /host/proc
        readOnly: true
      - name: host-sys
        mountPath: /host/sys
        readOnly: true
  configMap:
    create: true
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance"]
          target_label  = "app_instance"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
          target_label  = "app_component"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.pods.receiver]
      }

      loki.process "pods" {
        stage.static_labels {
          values = {
            cluster = "hydrosat-dev-eks",
            source  = "kubernetes_pod",
          }
        }

        forward_to = [loki.write.grafana_cloud.receiver]
      }

      loki.source.kubernetes_events "cluster" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.events.receiver]
      }

      loki.process "events" {
        stage.static_labels {
          values = {
            cluster = "hydrosat-dev-eks",
            source  = "kubernetes_event",
          }
        }

        forward_to = [loki.write.grafana_cloud.receiver]
      }

      loki.write "grafana_cloud" {
        endpoint {
          url = sys.env("GRAFANA_CLOUD_LOKI_URL")

          basic_auth {
            username = sys.env("GRAFANA_CLOUD_LOKI_USERNAME")
            password = sys.env("GRAFANA_CLOUD_LOKI_PASSWORD")
          }
        }

        external_labels = {
          cluster = "hydrosat-dev-eks",
        }
      }

      prometheus.exporter.unix "node" {
        rootfs_path = "/host/root"
        procfs_path = "/host/proc"
        sysfs_path  = "/host/sys"
      }

      prometheus.exporter.self "alloy" {}

      prometheus.scrape "node" {
        targets    = prometheus.exporter.unix.node.targets
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
      }

      prometheus.scrape "alloy" {
        targets    = prometheus.exporter.self.alloy.targets
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
      }

      prometheus.remote_write "grafana_cloud" {
        endpoint {
          url = sys.env("GRAFANA_CLOUD_METRICS_URL")

          basic_auth {
            username = sys.env("GRAFANA_CLOUD_METRICS_USERNAME")
            password = sys.env("GRAFANA_CLOUD_METRICS_PASSWORD")
          }
        }

        external_labels = {
          cluster = "hydrosat-dev-eks",
        }
      }
