apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hydrosat-external-secrets-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: hydrosat-platform
  source:
    repoURL: https://github.com/BranfordTGbieor/hydrosat-infra.git
    targetRevision: dev
    path: gitops/external-secrets
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
