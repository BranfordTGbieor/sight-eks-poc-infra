apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hydrosat-dagster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: hydrosat-platform
  source:
    repoURL: https://github.com/BranfordTGbieor/hydrosat-infra.git
    targetRevision: dev
    path: helm/dagster
    helm:
      valueFiles:
        - values-gitops.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dagster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
