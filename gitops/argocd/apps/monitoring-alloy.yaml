apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sight-poc-alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: sight-poc-platform
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.5.3
      helm:
        releaseName: sight-poc-alloy
        valueFiles:
          - $values/gitops/argocd/values/alloy-values.yaml
    - repoURL: REPLACE_WITH_GIT_REPOSITORY_URL
      targetRevision: REPLACE_WITH_GIT_TARGET_REVISION
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
