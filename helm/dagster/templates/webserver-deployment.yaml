apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sight-poc-dagster.fullname" . }}-webserver
spec:
  replicas: {{ .Values.dagster.webserver.replicaCount }}
  strategy:
{{ toYaml .Values.dagster.webserver.strategy | indent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: webserver
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: webserver
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
{{ toYaml .Values.dagster.podSecurityContext | indent 8 }}
      serviceAccountName: {{ include "sight-poc-dagster.serviceAccountName" . }}
{{- if .Values.dagster.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.dagster.topologySpread.maxSkew }}
          topologyKey: {{ .Values.dagster.topologySpread.topologyKey }}
          whenUnsatisfiable: {{ .Values.dagster.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: webserver
              app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
      containers:
        - name: webserver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.dagster.containerSecurityContext | indent 12 }}
          command:
            - dagster-webserver
            - --host
            - "0.0.0.0"
            - --port
            - "{{ .Values.dagster.webserverPort }}"
            - -w
            - /opt/dagster/app/workspace.yaml
          ports:
            - name: http
              containerPort: {{ .Values.dagster.webserverPort }}
          env:
            - name: DAGSTER_HOME
              value: {{ .Values.dagster.home | quote }}
            - name: DAGSTER_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "sight-poc-dagster.databaseSecretName" . }}
                  key: {{ .Values.database.secretKeys.url }}
            - name: ALERTMANAGER_URL
              value: {{ .Values.alerting.alertmanagerUrl | quote }}
            - name: SIGHT_POC_DATA_LAKE_BUCKET
              value: {{ .Values.dataLake.bucket | quote }}
            - name: SIGHT_POC_DATA_LAKE_PREFIX
              value: {{ .Values.dataLake.prefix | quote }}
          resources:
{{ toYaml .Values.dagster.webserver.resources | indent 12 }}
          volumeMounts:
            - name: dagster-config
              mountPath: {{ .Values.dagster.home }}
            - name: workspace
              mountPath: /opt/dagster/app/workspace.yaml
              subPath: workspace.yaml
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: dagster-config
          configMap:
            name: {{ include "sight-poc-dagster.fullname" . }}-config
            items:
              - key: dagster.yaml
                path: dagster.yaml
        - name: workspace
          configMap:
            name: {{ include "sight-poc-dagster.fullname" . }}-config
            items:
              - key: workspace.yaml
                path: workspace.yaml
