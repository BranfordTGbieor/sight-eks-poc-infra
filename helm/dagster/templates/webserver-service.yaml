apiVersion: v1
kind: Service
metadata:
  name: {{ include "sight-poc-dagster.fullname" . }}-webserver
spec:
  type: {{ .Values.dagster.webserver.serviceType }}
  selector:
    app.kubernetes.io/component: webserver
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: http

