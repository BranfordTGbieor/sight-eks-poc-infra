apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sight-poc-dagster.fullname" . }}-user-code
spec:
  replicas: {{ .Values.dagster.userCode.replicaCount }}
  strategy:
{{ toYaml .Values.dagster.userCode.strategy | indent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: user-code
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: user-code
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
{{ toYaml .Values.dagster.podSecurityContext | indent 8 }}
      serviceAccountName: {{ include "sight-poc-dagster.serviceAccountName" . }}
{{- if .Values.dagster.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.dagster.topologySpread.maxSkew }}
          topologyKey: {{ .Values.dagster.topologySpread.topologyKey }}
          whenUnsatisfiable: {{ .Values.dagster.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: user-code
              app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
      containers:
        - name: user-code
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.dagster.containerSecurityContext | indent 12 }}
          command:
            - dagster
            - api
            - grpc
            - --host
            - "0.0.0.0"
            - --port
            - "{{ .Values.dagster.grpcPort }}"
            - -m
            - sight_poc_dagster.definitions
          ports:
            - name: grpc
              containerPort: {{ .Values.dagster.grpcPort }}
          env:
            - name: ALERTMANAGER_URL
              value: {{ .Values.alerting.alertmanagerUrl | quote }}
            - name: SIGHT_POC_DATA_LAKE_BUCKET
              value: {{ .Values.dataLake.bucket | quote }}
            - name: SIGHT_POC_DATA_LAKE_PREFIX
              value: {{ .Values.dataLake.prefix | quote }}
            - name: DAGSTER_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "sight-poc-dagster.databaseSecretName" . }}
                  key: {{ .Values.database.secretKeys.url }}
          resources:
{{ toYaml .Values.dagster.userCode.resources | indent 12 }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 20
