apiVersion: v1
kind: Service
metadata:
  name: {{ include "sight-poc-dagster.fullname" . }}-user-code
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: user-code
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: grpc
      port: {{ .Values.dagster.grpcPort }}
      targetPort: grpc

