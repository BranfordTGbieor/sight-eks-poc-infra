apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hydrosat-dagster.fullname" . }}-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.dagster.migrate.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.dagster.migrate.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      securityContext:
{{ toYaml .Values.dagster.podSecurityContext | indent 8 }}
      serviceAccountName: {{ default "default" .Values.dagster.migrate.serviceAccountName | quote }}
      containers:
        - name: migrate-instance
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.dagster.containerSecurityContext | indent 12 }}
          command: ["dagster", "instance", "migrate"]
          env:
            - name: DAGSTER_HOME
              value: {{ .Values.dagster.home | quote }}
            - name: DAGSTER_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "hydrosat-dagster.databaseSecretName" . }}
                  key: {{ .Values.database.secretKeys.url }}
          resources:
{{ toYaml .Values.dagster.migrate.resources | indent 12 }}
          volumeMounts:
            - name: dagster-config
              mountPath: {{ .Values.dagster.home }}
      volumes:
        - name: dagster-config
          configMap:
            name: {{ include "hydrosat-dagster.fullname" . }}-config
            items:
              - key: dagster.yaml
                path: dagster.yaml
