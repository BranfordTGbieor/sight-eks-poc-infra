name: CI

on:
  push:
    branches:
      - main
      - master
      - qa
      - develop
      - dev
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
    paths:
      - ".github/workflows/ci.yml"
      - ".checkov.yml"
      - "terraform/**"
      - "grafana/**"
      - "helm/**"
      - "gitops/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".checkov.yml"
      - "terraform/**"
      - "grafana/**"
      - "helm/**"
      - "gitops/**"
      - "scripts/**"

permissions:
  contents: read

concurrency:
  group: sight-poc-infra-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.filter.outputs.workflow }}
      terraform: ${{ steps.filter.outputs.terraform }}
      grafana: ${{ steps.filter.outputs.grafana }}
      helm: ${{ steps.filter.outputs.helm }}
      checkov: ${{ steps.filter.outputs.checkov }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect infra-impacting changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            workflow:
              - '.github/workflows/ci.yml'
            terraform:
              - 'terraform/**'
            grafana:
              - 'grafana/**'
            helm:
              - 'helm/**'
              - 'gitops/**'
            checkov:
              - '.checkov.yml'
              - 'terraform/**'
              - 'grafana/**'
              - 'helm/**'
              - 'gitops/**'
              - 'scripts/**'

  checks:
    name: Checks
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.workflow == 'true' ||
      needs.changes.outputs.terraform == 'true' ||
      needs.changes.outputs.grafana == 'true' ||
      needs.changes.outputs.helm == 'true' ||
      needs.changes.outputs.checkov == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Terraform fmt
        if: needs.changes.outputs.terraform == 'true'
        run: terraform fmt -check -recursive terraform

      - name: Terraform fmt Grafana alerting
        if: needs.changes.outputs.grafana == 'true'
        run: terraform fmt -check -recursive grafana

      - name: Helm lint Dagster chart
        if: needs.changes.outputs.helm == 'true'
        run: helm lint ./helm/dagster

      - name: Checkov
        if: needs.changes.outputs.workflow == 'true' || needs.changes.outputs.checkov == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yml
          directory: .
          framework: terraform,kubernetes,github_actions
          quiet: true

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs:
      - changes
      - checks
    if: >
      needs.changes.outputs.terraform == 'true' ||
      needs.changes.outputs.grafana == 'true' ||
      needs.changes.outputs.helm == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init platform
        if: needs.changes.outputs.terraform == 'true'
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate platform
        if: needs.changes.outputs.terraform == 'true'
        working-directory: terraform
        run: terraform validate

      - name: Terraform init Grafana alerting
        if: needs.changes.outputs.grafana == 'true'
        working-directory: grafana
        run: terraform init -backend=false

      - name: Terraform validate Grafana alerting
        if: needs.changes.outputs.grafana == 'true'
        working-directory: grafana
        run: terraform validate

      - name: Setup Helm
        if: needs.changes.outputs.helm == 'true'
        uses: azure/setup-helm@v4

      - name: Add Helm repositories
        if: needs.changes.outputs.helm == 'true'
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

      - name: Render Dagster chart
        if: needs.changes.outputs.helm == 'true'
        run: helm template sight-poc-dagster ./helm/dagster >/tmp/sight-poc-dagster-rendered.yaml

      - name: Render observability charts
        if: needs.changes.outputs.helm == 'true'
        run: |
          helm template sight-poc-alloy grafana/alloy \
            --version 1.5.3 \
            -f gitops/argocd/values/alloy-values.yaml >/tmp/sight-poc-alloy-rendered.yaml

      - name: Render External Secrets operator chart
        if: needs.changes.outputs.helm == 'true'
        run: |
          helm template sight-poc-external-secrets external-secrets/external-secrets \
            --version 2.2.0 \
            -f gitops/argocd/values/external-secrets-values.yaml >/tmp/sight-poc-external-secrets-rendered.yaml

  plan:
    name: Reviewable Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: >
      needs.changes.outputs.terraform == 'true' &&
      vars.AWS_TERRAFORM_ROLE_ARN != '' &&
      vars.TF_STATE_BUCKET != '' &&
      vars.TF_LOCK_TABLE != ''
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve target environment
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          branch="${BASE_REF:-$REF_NAME}"
          case "${branch}" in
            main|master)
              environment_name="prod"
              ;;
            qa)
              environment_name="qa"
              ;;
            develop|dev)
              environment_name="dev"
              ;;
            *)
              environment_name="dev"
              ;;
          esac
          echo "environment_name=${environment_name}" >> "${GITHUB_OUTPUT}"
          echo "git_ref_tag=${REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write CI tfvars
        working-directory: terraform
        run: |
          cat > ci.auto.tfvars <<EOF
          environment = "${{ steps.resolve.outputs.environment_name }}"
          enable_service_kms_hardening = false
          extra_tags = {
            DeploymentSource = "github-actions-ci"
            GitRef           = "${{ steps.resolve.outputs.git_ref_tag }}"
          }
          EOF

      - name: Write backend config
        working-directory: terraform
        run: |
          cat > backend.ci.hcl <<EOF
          bucket         = "${{ vars.TF_STATE_BUCKET }}"
          dynamodb_table = "${{ vars.TF_LOCK_TABLE }}"
          key            = "${{ steps.resolve.outputs.environment_name }}/platform.tfstate"
          region         = "${AWS_REGION}"
          encrypt        = true
          EOF

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend.ci.hcl

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -no-color tfplan > terraform-plan.txt

      - name: Publish Terraform plan summary
        working-directory: terraform
        run: |
          terraform show -json tfplan > tfplan.json

          jq -r '
            def normalize_action(actions):
              if actions == ["create"] then "create"
              elif actions == ["update"] then "update"
              elif actions == ["delete"] then "delete"
              elif actions == ["create","delete"] or actions == ["delete","create"] then "replace"
              elif actions == ["no-op"] then "no-op"
              else (actions | join(","))
              end;
            [
              .resource_changes[]
              | {
                  address,
                  action: normalize_action(.change.actions)
                }
              | select(.action != "no-op")
            ] as $changes
            | {
                create: ($changes | map(select(.action == "create")) | length),
                update: ($changes | map(select(.action == "update")) | length),
                delete: ($changes | map(select(.action == "delete")) | length),
                replace: ($changes | map(select(.action == "replace")) | length),
                rows: ($changes | sort_by(.action, .address))
              }
          ' tfplan.json > tfplan-summary.json

          {
            echo "## Terraform Plan Summary"
            echo
            echo "| Action | Count |"
            echo "| --- | ---: |"
            echo "| Create | $(jq -r '.create' tfplan-summary.json) |"
            echo "| Update | $(jq -r '.update' tfplan-summary.json) |"
            echo "| Delete | $(jq -r '.delete' tfplan-summary.json) |"
            echo "| Replace | $(jq -r '.replace' tfplan-summary.json) |"
            echo
            echo "### Resource Changes"
            echo
            echo "| Action | Address |"
            echo "| --- | --- |"
            jq -r '.rows[:40][] | "| \(.action) | `\(.address)` |"' tfplan-summary.json
          } >> "${GITHUB_STEP_SUMMARY}"

          total_changes="$(jq -r '.rows | length' tfplan-summary.json)"
          if [ "${total_changes}" -gt 40 ]; then
            echo >> "${GITHUB_STEP_SUMMARY}"
            echo "_Showing first 40 of ${total_changes} resource changes. Download the full plan artifact for the complete diff._" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload reviewable plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-terraform-plan-${{ steps.resolve.outputs.environment_name }}
          path: |
            terraform/tfplan
            terraform/tfplan.json
            terraform/tfplan-summary.json
            terraform/terraform-plan.txt
