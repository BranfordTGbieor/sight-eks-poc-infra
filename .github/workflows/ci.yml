name: CI

on:
  push:
    branches:
      - main
      - master
      - qa
      - develop
      - dev
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Helm lint Dagster chart
        run: helm lint ./helm/dagster

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yml
          directory: .
          framework: terraform,kubernetes,github_actions
          quiet: true

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init platform
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate platform
        working-directory: terraform
        run: terraform validate

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

      - name: Render Dagster chart
        run: helm template hydrosat-dagster ./helm/dagster >/tmp/hydrosat-dagster-rendered.yaml

      - name: Render observability charts
        run: |
          helm template hydrosat-alloy grafana/alloy \
            --version 1.5.3 \
            -f gitops/argocd/values/alloy-values.yaml >/tmp/hydrosat-alloy-rendered.yaml

      - name: Render External Secrets operator chart
        run: |
          helm template hydrosat-external-secrets external-secrets/external-secrets \
            --version 2.2.0 \
            -f gitops/argocd/values/external-secrets-values.yaml >/tmp/hydrosat-external-secrets-rendered.yaml
