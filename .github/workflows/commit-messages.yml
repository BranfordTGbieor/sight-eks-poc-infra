name: Commit Messages

on:
  push:
    branches:
      - main
      - test
      - prod
  pull_request:

permissions:
  contents: read

concurrency:
  group: sight-poc-infra-commit-messages-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch origin "${BASE_REF}" --depth=1
            echo "rev_range=origin/${BASE_REF}..HEAD" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            echo "rev_range=${BEFORE_SHA}..${HEAD_SHA}" >> "${GITHUB_OUTPUT}"
          else
            echo "single_commit=${HEAD_SHA}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate commit messages in range
        if: steps.range.outputs.rev_range != ''
        run: ./scripts/ci/check_commit_messages.py --rev-range "${{ steps.range.outputs.rev_range }}"

      - name: Validate single commit message
        if: steps.range.outputs.single_commit != ''
        run: ./scripts/ci/check_commit_messages.py --commit "${{ steps.range.outputs.single_commit }}"
